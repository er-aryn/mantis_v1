services:
  - type: web
    name: mantis-app
    runtime: node
    region: oregon
    rootDir: hello-all-here-is-the-problem
    buildCommand: npm install && mkdir -p data/db && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/health
    plan: free
    autoDeploy: true
